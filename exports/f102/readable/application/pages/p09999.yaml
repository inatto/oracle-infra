      name: p_consent

    parameter: 
      direction: In
      data-type: BOOLEAN
      has-default: false

    value: 
      type: Item
      item: P9999_REMEMBER

    advanced: 
      display-sequence: 2

- # ====== Process: --Get Username Cookie ======================
  id: 7899672164527920
  identification: 
    name: '--Get Username Cookie'
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      :P9999_USERNAME := apex_authentication.get_login_username_cookie;
      :P9999_REMEMBER := case when :P9999_USERNAME is not null then 'Y' end;

  execution: 
    sequence: 40
    point: Before Header
    run-process: Once Per Page Visit (default)

  configuration: 
    build-option: Commented Out # 7887430499527870

