processes: 
- # ====== Process: New ========================================
  id: 1038921203773790
  identification: 
    name: New
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      BEGIN
        IF :P2ETH IS NOT NULL THEN
          SELECT plural_name
          INTO :P2_ETYPE_NAME
          FROM vw_etype
          WHERE hash = :P2ETH;
        ELSE
          :P2_ETYPE_NAME := 'Membros';
        END IF;
      END;
      

  execution: 
    sequence: 10
    point: Before Header
    run-process: Once Per Page Visit (default)

