- # ====== Region: Tickets Abertos =============================
  id: 7958916804972941
  identification: 
    name: Tickets Abertos
    title: Abertos
    type: Cards

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select to_char(open_date, 'dd/mm/yyyy') open_date_str
           , to_char(done_date, 'dd/mm/yyyy') done_date_str
           , ticket.*
      
      from
          ticket
      where 1=1
          AND tenant_code = v('TENANT_CODE')
          and done_date is  null
      ;
      

  order-by: 
    type: Item
    item: 
      item-name: P4_ORDER_BY
      order-bys: 
      - key: URGENT
        clause: '"URGENT" desc'

      - key: OPEN_DATE1
        clause: '"ID" desc'

      - key: OPEN_DATE
        clause: '"ID" asc'

      - key: TITLE
        clause: '"TITLE" asc'

  layout: 
    sequence: 10
    parent-region: New # 2069365536934651
    slot: SUB_REGIONS
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Cards Container
    template-options: 
    - '#DEFAULT#'
    - t-CardsRegion--hideHeader js-addHiddenHeadingRoleDesc
    - margin-top-md
    render-components: Above Content

  accessibility: 
    use-landmark: true
    landmark-type: Template Default

  advanced: 
    region-display-selector: false
    exclude-title-from-translation: false

  header-and-footer: 
    header-text: <h2>Abertos</h2>

  customization: 
    customizable: Not Customizable By End Users

  attributes: 
    id: 7959391781972944
    appearance: 
      layout: Float

    card: 
      primary-key-column-1: ID

    title: 
      advanced-formatting: true
      html-expression: |
        {if URGENT/}
            <div style="max-width: 200px; color: red;">&TITLE.</div>
        {else/}
            <div style="max-width: 200px;">&TITLE.</div>
        {endif/}
        
        
        

    subtitle: 
      advanced-formatting: false
      column: OPEN_DATE_STR

    body: 
      advanced-formatting: true
      html-expression: |
        <div style="float: left; padding-right: 10px;">
            {if OPEN_DATE_STR/}
            <div style="font-size: x-small; color: #2f2f2f;">Abertura</div>
            <div style="font-size: smaller; color: #2f2f2f;">&OPEN_DATE_STR.</div>
            {endif/}
        </div>
        <div style="float: left;">
            {if DONE_DATE_STR/}
            <div style="font-size: x-small; color: #2f2f2f;">Fechamento</div>
            <div style="font-size: smaller; background-color: #ff3737; color: white; padding: 2px;">&DONE_DATE_STR.</div>
            {endif/}
        </div>
        <div style="clear: both;"></div>

    secondary-body: 
      advanced-formatting: false

    icon-and-badge: 
      icon-source: Initials
      icon-column: ID
      icon-css-classes: back-blue-violet
      icon-position: Start

    media: 
      advanced-formatting: false
      source: No Media

    performance: 
      lazy-loading: false

    pagination: 
      type: Scroll
      show-total-count: false

    actions: 
    - # ====== Action: Full Card ===================================
      id: 7877976697520611
      identification: 
        type: Full Card

      layout: 
        sequence: 10

      link: 
        type: Redirect to Page in this Application
        target: 
          url: 'f?p=&APP_ID.:7:&SESSION.::&DEBUG.::P7_ID:&ID.'
          page: 7 # ticket-completo
          values: 
            p7_id: '&ID.'

