processes: 
- # ====== Process: Tenta login completo e redireciona =========
  id: 3454633294645170
  identification: 
    name: Tenta login completo e redireciona
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      begin
      
          --
          prc_internal_login(:G_TENANT_CODE, :G_USERNAME, :G_PASSWORD, :P9998_ETYPE, :G_ENTITY_ID);
      
          -- redireciona manualmente e garante sessão setada
          apex_util.redirect_url('f?p=' || v('APP_ID') || ':1:' || v('APP_SESSION'));
      
      
      end;

  execution: 
    sequence: 10
    point: Processing
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

branches: 
- # ====== Branch: Go To Page 9999 - If G_ENTITY_ID is null ====
  id: 3453766887645161
  identification: 
    name: Go To Page 9999 - If G_ENTITY_ID is null

  execution: 
    sequence: 10
    point: Before Header

  behavior: 
    type: URL Identified by Item (Redirect)
    item: '&LOGOUT_URL.'

  server-side-condition: 
    type: Item is NULL
    item: G_ENTITY_ID

- # ====== Branch: Go To Page 1 - If only one type =============
  id: 3456189078645185
  identification: 
    name: Go To Page 1 - If only one type

  execution: 
    sequence: 20
    point: Before Header

  behavior: 
    type: Page or URL (Redirect)
    target: 
      url: 'f?p=&APP_ID.:1:&SESSION.::&DEBUG.:::&success_msg=#SUCCESS_MSG#'
      page: 1 # Dashboard

  server-side-condition: 
    type: Function Body
    language: PL/SQL
    pl/sql-function-body: |
      DECLARE
      
          v_etype_code VARCHAR2(100);
      
      BEGIN
      
          -- se tem apenas um, retorna o type
          v_etype_code := members_etypes_count(:G_TENANT_CODE, :G_USERNAME, :G_PASSWORD);
      
          -- e se tiver, ja loga
          IF v_etype_code IS NOT NULL THEN
              prc_internal_login(:G_TENANT_CODE, :G_USERNAME, :G_PASSWORD, v_etype_code, :G_ENTITY_ID);
              return true;
          END IF;
      
      END;

