    - '#DEFAULT#'
    height: 1

  validation: 
    value-required: false

  list-of-values: 
    type: SQL Query
    sql-query: |
      SELECT distinct etype_name, etype_code
      FROM vw_member
      WHERE 1 = 1
          AND active = 1
          AND LOWER(tenant_code) = LOWER(:G_TENANT_CODE)
          AND entity_id = :G_ENTITY_ID
      ;
      
      
      
