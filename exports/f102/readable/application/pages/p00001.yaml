  attributes: 
    id: 2008394691775550
    chart: 
      type: Pie

    title: 
      title: Membros Associados &TENANT_CODE.

    layout: 
      height: 400

    data-cursor: 
      cursor: Automatic
      behavior: Automatic
      dim-on-hover: true

    settings: 
      pie-selection-effect: Highlight

    value: 
      pie-chart-other-threshold: 0
      format: Decimal
      decimal-places: 0
      format-scaling: None

    animation: 
      on-display: Automatic
      on-data-change: Automatic

    tooltip: 
      show: true
      show-series-name: true
      show-value: true

    legend: 
      show: true
      position: Automatic
      hide-and-show-behavior: Rescale

    series: 
    - # ====== Series: New =========================================
      id: 2008473071775551
      identification: 
        name: New

      execution: 
        sequence: 10

      source: 
        location: Local Database
        type: SQL Query
        sql-query: |
          -- membros por entidade
          SELECT t.code, count(*)
          FROM member m
          LEFT JOIN entity e ON m.entity_id = e.id
          left join tenant t on t.code = m.tenant_code
          where 1=1
          -- and m.active = 1
          -- and e.active = 1
          and m.etype_code = 'associate'
          
          -- 20250710 todo atencao
          and t.id_master = :TENANT_ID
          group by t.code
          ORDER BY count(*) desc
          ;
          
          

      order-by: 
        type: None

      column-mapping: 
        label: CODE
        value: COUNT(*)

      label: 
        show: true
        position: Automatic
        display-as: Label - Value

