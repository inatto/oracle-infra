validations: 
- # ====== Validation: P5_DONE_DATE ============================
  id: 8476443271124701
  identification: 
    name: P5_DONE_DATE

  execution: 
    sequence: 10

  validation: 
    type: Expression
    language: PL/SQL
    pl/sql-expression: ':P5_DONE_DATE >= :P5_OPEN_DATE'
    always-execute: false

  error: 
    error-message: Data de fechamento deve ser maior ou igual à data de abertura.
    display-location: Inline with Field and in Notification
    associated-item: P5_DONE_DATE # 7878801516520620

- # ====== Validation: P5_URGENT ===============================
  id: 8492034708776702
  identification: 
    name: P5_URGENT

  execution: 
    sequence: 20

  validation: 
    type: Function Body (returning Boolean)
    language: PL/SQL
    pl/sql-function-body: |
      declare
        v_count number;
        v_result boolean;
      
      begin
        select count(*) into v_count from ticket where (id <> :P5_ID or :P5_ID is null) and urgent = 1 and done_date is null;
      
        if :P5_URGENT = 1 and v_count >= 3 then
          v_result := false;
        else
          v_result := true;
        end if;
      
        return v_result;
      
        
      end;
    always-execute: false

  error: 
    error-message: Não podem existir mais de 3 tickets urgentes.
    display-location: Inline with Field and in Notification
    associated-item: P5_URGENT # 8491909224776701

processes: 
- # ====== Process: prc_http_mail ==============================
  id: 399166796646249
  identification: 
    name: prc_http_mail
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      declare
      
          title varchar2(200);
      
      BEGIN
      
          --
          if (:P5_ACTION = 'New') then
              title  := 'Novo ticket - ' || :P5_TITLE;
              prc_http_mail(title  , '', :P5_OPEN_DATE, :P5_DONE_DATE);
          end if;
      
      EXCEPTION
          WHEN OTHERS THEN
              null;
              
      END;
      
      

  execution: 
    sequence: 30
    point: Processing
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

