validations: 
- # ====== Validation: verifica se o membro ja existe ==========
  id: 1762132537836751
  identification: 
    name: verifica se o membro ja existe

  execution: 
    sequence: 10

  validation: 
    type: Function Body (returning Boolean)
    language: PL/SQL
    pl/sql-function-body: |
      DECLARE
         v_exists NUMBER;
      
      BEGIN
      
          -- verifica se o membro ja existe
          SELECT COUNT(*)
          INTO v_exists
          FROM member
          WHERE entity_id = :P19_ENTITY AND etype_code = :P19_ETYPE_CODE;
      
          IF v_exists = 0 THEN
              RETURN TRUE;
          ELSE
              RETURN FALSE;
          END IF;
      
      END;
    always-execute: false

  error: 
    error-message: Já existe membro com este cadastro.
    display-location: Inline with Field and in Notification

