dynamic-actions: 
- # ====== Dynamic Action: New =================================
  id: 1643109713258607
  identification: 
    name: New

  execution: 
    sequence: 30
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P20_NEW

  actions: 
  - # ====== Action: Execute Server-side Code ====================
    id: 1643698218258609
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        begin
        
            --
            :P20_ID := :P20_NEW;
        
            --
            select name into :P20_NAME 
            from entity where id = :P20_NEW;
        
        
        
        end;
      items-to-submit: 
      - P20_NEW
      items-to-return: 
      - P20_ID
      - P20_NAME
      suppress-change-event: false

    execution: 
      sequence: 10
      event: New # 1643109713258607
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

- # ====== Dynamic Action: page_load ===========================
  id: 1644097296258610
  identification: 
    name: page_load

  execution: 
    sequence: 20
    event-scope: Static

  when: 
    event: Page Load

  actions: 
  - # ====== Action: Execute JavaScript Code =====================
    id: 1644526830258612
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: applyMasks();

    execution: 
      sequence: 10
      event: page_load # 1644097296258610
      fire-when-event-result-is: True
      fire-on-initialization: false

validations: 
- # ====== Validation: P20_EMAIL ===============================
  id: 1640813191258601
  identification: 
    name: P20_EMAIL

  execution: 
    sequence: 20

  validation: 
    type: Function Body (returning Boolean)
    language: PL/SQL
    pl/sql-function-body: "RETURN REGEXP_LIKE(:P20_EMAIL, '^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$');"
    always-execute: false

  error: 
    error-message: E-mail inválido.
    display-location: Inline with Field and in Notification
    associated-item: P20_EMAIL # 41403352598115213

- # ====== Validation: P20_BIRTH_DATE ==========================
  id: 1641254516258602
  identification: 
    name: P20_BIRTH_DATE

  execution: 
    sequence: 10

  validation: 
    type: Expression
    language: PL/SQL
    pl/sql-expression: ':P20_BIRTH_DATE <= TRUNC(SYSDATE)'
    always-execute: false

  error: 
    error-message: |
      Data de nascimento não pode ser no futuro.
      
    display-location: Inline with Field and in Notification
