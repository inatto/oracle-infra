  server-side-condition: 
    type: Function Body
    language: PL/SQL
    pl/sql-function-body: |
      begin
      
          --  se estiver DELETE ignora o DML
          IF :REQUEST = 'DELETE' THEN
             return false;
          END IF;
      
          return true;
      
      end;

